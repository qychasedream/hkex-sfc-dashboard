name: Regulatory Data Update (Free Tier)

on:
  schedule:
    # 每 15 分钟自动更新一次（GitHub Actions 公共仓库免费）
    - cron: '*/15 * * * *'
  # 允许手动触发
  workflow_dispatch:
  # 每次推送到 main 分支时也更新一次（方便测试）
  push:
    branches: [main]

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run update script
        run: python src/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "📊 自动更新监管数据 — $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M HKT')"
            git push
            echo "✅ Data updated and pushed"
          fi
