name: Hourly Data Update (HKT 09:00-18:00)

on:
  schedule:
    # 香港时间 09:00-18:00 每小时刷新 (UTC 01:00-10:00)
    - cron: '0 1-10 * * *'
  # 也允许手动触发
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run update script
        run: python src/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "📊 自动更新监管数据 — $(TZ='Asia/Hong_Kong' date +'%Y-%m-%d %H:%M HKT')"
            git push
            echo "✅ Data updated and pushed"
          fi
